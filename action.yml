name: 'tofulock verify'
description: 'Fail the build if any locked Terraform/OpenTofu module has drifted from its pinned commit.'
branding:
  icon: 'lock'
  color: 'purple'
inputs:
  directory:
    description: 'Directory containing the module config and .tofulock.lock.json'
    required: false
    default: '.'
  version:
    description: 'tofulock version to install (a release tag, or a branch like "main")'
    required: false
    default: 'main'
  json:
    description: 'Emit machine-readable JSON output'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version: 'stable'
    - name: Install tofulock
      shell: bash
      run: go install github.com/Conalh/tofulock@${{ inputs.version }}
    - name: Verify module integrity
      shell: bash
      run: |
        if [ "${{ inputs.json }}" = "true" ]; then
          tofulock verify "${{ inputs.directory }}" --json
        else
          tofulock verify "${{ inputs.directory }}"
        fi
