name: 'tofulock verify'
description: 'Fail the build if any locked Terraform/OpenTofu module has drifted from its pinned commit.'
branding:
  icon: 'lock'
  color: 'purple'
inputs:
  directory:
    description: 'Directory containing the module config and .tofulock.lock.json'
    required: false
    default: '.'
  version:
    description: 'tofulock version to install (a release tag, or a branch like "main")'
    required: false
    default: 'v0.5.0'
  json:
    description: 'Emit machine-readable JSON output'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version: 'stable'
    # Inputs are passed via env, not interpolated into the script, so a
    # crafted input value can't inject shell commands.
    - name: Install tofulock
      shell: bash
      env:
        TOFULOCK_VERSION: ${{ inputs.version }}
      run: go install "github.com/Conalh/tofulock@$TOFULOCK_VERSION"
    - name: Verify module integrity
      shell: bash
      env:
        TOFULOCK_DIR: ${{ inputs.directory }}
        TOFULOCK_JSON: ${{ inputs.json }}
      run: |
        if [ "$TOFULOCK_JSON" = "true" ]; then
          tofulock verify "$TOFULOCK_DIR" --json
        else
          tofulock verify "$TOFULOCK_DIR"
        fi
