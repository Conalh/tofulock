name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: build
        run: go build ./...

  dogfood:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: build
        run: go build -o tofulock .
      - name: verify example modules (self-dogfood)
        run: ./tofulock verify ./examples/basic
      - name: attest + verify-attest (self-dogfood)
        run: |
          ./tofulock keygen --out ci
          ./tofulock attest ./examples/basic --key ci.key --out ci.dsse.json --approved-by ci@tofulock
          ./tofulock verify-attest ./examples/basic --key ci.pub --att ci.dsse.json
      - name: verify terragrunt example (self-dogfood)
        run: ./tofulock verify ./examples/terragrunt
      - name: verify opentofu example (self-dogfood)
        run: ./tofulock verify ./examples/opentofu
        env:
          TOFULOCK_REGISTRY_HOST: registry.opentofu.org
